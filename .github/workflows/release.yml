name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: theuselessai/plit

jobs:
  meta:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.meta.outputs.version }}
      is_rc: ${{ steps.meta.outputs.is_rc }}
      pipelit_version: ${{ steps.versions.outputs.pipelit }}
      plit_version: ${{ steps.versions.outputs.plit }}
      plit_gw_version: ${{ steps.versions.outputs.plit_gw }}
      plit_tui_version: ${{ steps.versions.outputs.plit_tui }}
    steps:
      - uses: actions/checkout@v4

      - name: Extract tag metadata
        id: meta
        run: |
          VERSION="${GITHUB_REF#refs/tags/v}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          if [[ "$VERSION" == *-rc* ]]; then
            echo "is_rc=true" >> "$GITHUB_OUTPUT"
          else
            echo "is_rc=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Read VERSION manifest
        id: versions
        run: |
          source VERSION
          echo "project=$PROJECT" >> "$GITHUB_OUTPUT"
          echo "plit=$PLIT" >> "$GITHUB_OUTPUT"
          echo "plit_gw=$PLIT_GW" >> "$GITHUB_OUTPUT"
          echo "plit_tui=$PLIT_TUI" >> "$GITHUB_OUTPUT"
          echo "pipelit=$PIPELIT" >> "$GITHUB_OUTPUT"

  # RC: build Docker image, run full E2E, push to GHCR
  build-docker:
    needs: meta
    if: needs.meta.outputs.is_rc == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build Docker image
        run: |
          docker build \
            --build-arg PIPELIT_REF=v${{ needs.meta.outputs.pipelit_version }} \
            -t ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ needs.meta.outputs.version }} \
            .

      - name: Push Docker image
        run: docker push ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ needs.meta.outputs.version }}

  e2e:
    needs: [meta, build-docker]
    if: needs.meta.outputs.is_rc == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout Pipelit (for E2E scripts)
        uses: actions/checkout@v4
        with:
          repository: theuselessai/Pipelit
          ref: v${{ needs.meta.outputs.pipelit_version }}

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Pull built image
        run: |
          docker pull ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ needs.meta.outputs.version }}
          docker tag ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ needs.meta.outputs.version }} plit-e2e:local

      - name: Run full E2E
        env:
          ANTHROPIC_API_KEY: ${{ secrets.LLM_API_KEY }}
        run: ./e2e/run_smoke.sh plit-e2e:local

      - name: Container logs on failure
        if: failure()
        run: |
          for c in $(docker ps -a --filter name=plit-e2e-smoke --format '{{.Names}}'); do
            echo "=== Logs: $c ==="
            docker logs "$c" 2>&1 | tail -100
          done

  # Stable: build platform binaries
  build-binaries:
    needs: meta
    if: needs.meta.outputs.is_rc == 'false'
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-musl
            runner: ubuntu-latest
            use_cross: true
            artifact: plit-linux-x86_64
          - target: i686-unknown-linux-musl
            runner: ubuntu-latest
            use_cross: true
            artifact: plit-linux-i686
          - target: aarch64-unknown-linux-musl
            runner: ubuntu-latest
            use_cross: true
            artifact: plit-linux-aarch64
          - target: x86_64-apple-darwin
            runner: macos-latest
            use_cross: false
            artifact: plit-darwin-x86_64
          - target: aarch64-apple-darwin
            runner: macos-latest
            use_cross: false
            artifact: plit-darwin-aarch64
          - target: x86_64-pc-windows-msvc
            runner: windows-latest
            use_cross: false
            artifact: plit-windows-x86_64
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross
        if: matrix.use_cross
        uses: taiki-e/install-action@cross

      - name: Build (cross)
        if: matrix.use_cross
        run: cross build --release --target ${{ matrix.target }}

      - name: Build (native)
        if: "!matrix.use_cross"
        run: cargo build --release --target ${{ matrix.target }}

      - name: Package binaries (unix)
        if: runner.os != 'Windows'
        run: |
          mkdir -p dist
          cp target/${{ matrix.target }}/release/plit dist/
          cp target/${{ matrix.target }}/release/plit-gw dist/
          cp target/${{ matrix.target }}/release/plit-tui dist/
          chmod +x dist/plit dist/plit-gw dist/plit-tui
          tar czf ${{ matrix.artifact }}.tar.gz -C dist plit plit-gw plit-tui

      - name: Package binaries (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist
          Copy-Item target/${{ matrix.target }}/release/plit.exe dist/
          Copy-Item target/${{ matrix.target }}/release/plit-gw.exe dist/
          Copy-Item target/${{ matrix.target }}/release/plit-tui.exe dist/
          Compress-Archive -Path dist/plit.exe, dist/plit-gw.exe, dist/plit-tui.exe -DestinationPath ${{ matrix.artifact }}.zip

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}.*
          if-no-files-found: error
          retention-days: 1

  # Stable: promote Docker image
  promote:
    needs: meta
    if: needs.meta.outputs.is_rc == 'false'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Retag RC image as stable
        run: |
          VERSION="${{ needs.meta.outputs.version }}"
          for i in $(seq 10 -1 1); do
            RC_TAG="${VERSION}-rc.${i}"
            if docker pull ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${RC_TAG} 2>/dev/null; then
              echo "Found RC image: ${RC_TAG}"
              docker tag ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${RC_TAG} ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${VERSION}
              docker tag ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${RC_TAG} ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
              docker push ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${VERSION}
              docker push ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
              exit 0
            fi
          done
          echo "::error::No RC image found for v${VERSION}. Tag an RC first."
          exit 1

  release:
    needs: [meta, build-docker, e2e, build-binaries, promote]
    if: always() && !failure() && !cancelled()
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download all binary artifacts
        if: needs.meta.outputs.is_rc == 'false'
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: List artifacts
        if: needs.meta.outputs.is_rc == 'false'
        run: ls -la artifacts/ || true

      - name: Create GitHub Release
        uses: ncipollo/release-action@v1
        with:
          tag: v${{ needs.meta.outputs.version }}
          name: v${{ needs.meta.outputs.version }}
          prerelease: ${{ needs.meta.outputs.is_rc == 'true' }}
          makeLatest: ${{ needs.meta.outputs.is_rc == 'false' }}
          generateReleaseNotes: true
          artifacts: artifacts/*
          body: |
            ## Components

            | Component | Version |
            |-----------|---------|
            | plit | ${{ needs.meta.outputs.plit_version }} |
            | plit-gw | ${{ needs.meta.outputs.plit_gw_version }} |
            | plit-tui | ${{ needs.meta.outputs.plit_tui_version }} |
            | Pipelit | ${{ needs.meta.outputs.pipelit_version }} |

            ## Install

            ```sh
            curl -sSf https://raw.githubusercontent.com/theuselessai/plit/main/install.sh | sh
            ```

            Or download a binary below for your platform.

            ## Docker

            ```sh
            docker pull ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ needs.meta.outputs.version }}
            ```

  publish-crate:
    needs: [meta, promote]
    if: needs.meta.outputs.is_rc == 'false'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Publish to crates.io
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: cargo publish --no-verify --allow-dirty
