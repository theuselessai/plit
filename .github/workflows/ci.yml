name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

permissions:
  packages: read

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1
  REGISTRY: ghcr.io
  IMAGE_NAME: theuselessai/plit

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Clippy
        run: cargo clippy --all-targets --all-features -- -D warnings

  build:
    name: Build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        include:
          - os: ubuntu-latest
            binary_ext: ""
          - os: macos-latest
            binary_ext: ""
          - os: windows-latest
            binary_ext: ".exe"
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Build and test
        run: |
          cargo test --all-features
          cargo build --release --verbose

      - name: Upload plit binary
        uses: actions/upload-artifact@v4
        with:
          name: plit-${{ runner.os }}
          path: target/release/plit${{ matrix.binary_ext }}
          if-no-files-found: error
          retention-days: 7

      - name: Upload plit-gw binary
        uses: actions/upload-artifact@v4
        with:
          name: plit-gw-${{ runner.os }}
          path: target/release/plit-gw${{ matrix.binary_ext }}
          if-no-files-found: error
          retention-days: 7

      - name: Upload plit-tui binary
        uses: actions/upload-artifact@v4
        with:
          name: plit-tui-${{ runner.os }}
          path: target/release/plit-tui${{ matrix.binary_ext }}
          if-no-files-found: error
          retention-days: 7

  docker-e2e:
    name: Docker E2E
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Pipelit (for mock LLM server)
        uses: actions/checkout@v4
        with:
          repository: theuselessai/Pipelit
          ref: master
          sparse-checkout: e2e
          path: pipelit

      - name: Download plit binary
        uses: actions/download-artifact@v4
        with:
          name: plit-${{ runner.os }}

      - name: Make binary executable
        run: chmod +x plit

      - name: Start mock LLM server
        run: python3 pipelit/e2e/mock_llm_server.py --port 9999 &
        shell: bash

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Run Docker mode init
        run: ./plit init --non-interactive --username admin --password testpass123 --llm-provider anthropic --api-key sk-mock-test-key --llm-model claude-sonnet-4-20250514 --llm-base-url http://host.docker.internal:9999
        env:
          PLIT_DOCKER_MODE: "1"

      - name: Start container
        run: ./plit start

      - name: Wait for services
        run: |
          python3 -c "
          import json, time, urllib.request, sys

          for i in range(1, 91):
              try:
                  urllib.request.urlopen('http://localhost:8080/health')
                  req = urllib.request.Request(
                      'http://localhost:8000/api/v1/auth/token/',
                      data=json.dumps({'username': 'admin', 'password': 'testpass123'}).encode(),
                      headers={'Content-Type': 'application/json'})
                  urllib.request.urlopen(req)
                  print(f'All services ready after {i}s')
                  sys.exit(0)
              except Exception:
                  time.sleep(1)
          print('Services not ready after 90s')
          sys.exit(1)
          "

      - name: Test plit auth login/status/logout
        run: |
          ./plit auth login --url http://localhost:8000 --username admin --password testpass123
          ./plit auth status
          ./plit auth logout
          ./plit auth status 2>&1 | grep -q "Not logged in"
          echo "Auth commands passed"

      - name: Auth and send chat message
        run: |
          python3 -c "
          import json, time, urllib.request

          BASE = 'http://localhost:8000/api/v1'
          GW = 'http://localhost:8080'

          def api(method, path, token=None, data=None):
              headers = {'Content-Type': 'application/json'}
              if token:
                  headers['Authorization'] = f'Bearer {token}'
              body = json.dumps(data).encode() if data else None
              req = urllib.request.Request(f'{BASE}{path}', data=body, headers=headers, method=method)
              return json.loads(urllib.request.urlopen(req).read())

          # 1. Authenticate
          auth = api('POST', '/auth/token/', data={'username': 'admin', 'password': 'testpass123'})
          token = auth['key']
          print(f'1. Authenticated (token: {token[:8]}...)')

          # 2. Create API key
          key_resp = api('POST', '/users/me/keys', token=token, data={'name': 'e2e-ci-key'})
          api_key = key_resp.get('raw_key') or key_resp.get('key', '')
          assert api_key, f'No API key returned: {key_resp}'
          print(f'2. Created API key ({api_key[:8]}...)')

          # 3. Get credential token from container config
          import subprocess
          cred_token = subprocess.check_output([
              'docker', 'exec', 'plit', 'python3', '-c',
              \"import json; cfg=json.load(open('/root/.config/plit/config.json')); creds=cfg['credentials']; print(list(creds.values())[0]['token'])\"
          ]).decode().strip()
          print(f'3. Got credential token ({cred_token[:8]}...)')

          # 4. Send message through gateway
          send_req = urllib.request.Request(
              f'{GW}/api/v1/chat/default_agent',
              data=json.dumps({'chat_id': 'e2e-test', 'text': 'Hello mock', 'from': {'id': 'ci-user'}}).encode(),
              headers={'Authorization': f'Bearer {cred_token}', 'Content-Type': 'application/json'})
          send_resp = json.loads(urllib.request.urlopen(send_req).read())
          print(f'4. Message sent: {json.dumps(send_resp)}')

          # 5. Wait for async processing
          time.sleep(5)
          print('5. Mock LLM chat round-trip complete')
          "

      - name: Stop container
        if: always()
        run: ./plit stop

      - name: Container logs on failure
        if: failure()
        run: docker logs plit 2>&1
