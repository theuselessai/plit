name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

permissions:
  packages: read

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1
  REGISTRY: ghcr.io
  IMAGE_NAME: theuselessai/plit

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Clippy
        run: cargo clippy --all-targets --all-features -- -D warnings

  test:
    name: Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Run tests
        run: cargo test --all-features

  build:
    name: Build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        include:
          - os: ubuntu-latest
            binary_ext: ""
          - os: macos-latest
            binary_ext: ""
          - os: windows-latest
            binary_ext: ".exe"
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Build release
        run: cargo build --release --verbose

      - name: Upload plit binary
        uses: actions/upload-artifact@v4
        with:
          name: plit-${{ runner.os }}
          path: target/release/plit${{ matrix.binary_ext }}
          if-no-files-found: error
          retention-days: 7

      - name: Upload plit-gw binary
        uses: actions/upload-artifact@v4
        with:
          name: plit-gw-${{ runner.os }}
          path: target/release/plit-gw${{ matrix.binary_ext }}
          if-no-files-found: error
          retention-days: 7

  docker-e2e:
    name: Docker E2E (${{ matrix.os }})
    needs: build
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        include:
          - os: ubuntu-latest
            binary: ./plit
          - os: macos-latest
            binary: ./plit
          - os: windows-latest
            binary: ./plit.exe
    steps:
      - name: Set up Docker (macOS)
        if: runner.os == 'macOS'
        uses: douglascamata/setup-docker-macos-action@v1

      - name: Download plit binary
        uses: actions/download-artifact@v4
        with:
          name: plit-${{ runner.os }}

      - name: Make binary executable
        if: runner.os != 'Windows'
        run: chmod +x plit

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Run Docker mode init
        run: ${{ matrix.binary }} init --non-interactive --username admin --password testpass123 --llm-provider anthropic --api-key sk-mock-test-key --llm-model claude-sonnet-4-20250514
        env:
          PLIT_DOCKER_MODE: "1"

      - name: Start container
        run: ${{ matrix.binary }} start

      - name: Verify gateway health (unix)
        if: runner.os != 'Windows'
        run: |
          for i in $(seq 1 60); do
            if curl -sf http://localhost:8080/health > /dev/null 2>&1; then
              echo "Gateway healthy after ${i}s"
              exit 0
            fi
            sleep 1
          done
          echo "Gateway health check failed after 60s"
          docker logs plit 2>&1 | tail -50
          exit 1

      - name: Verify gateway health (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          for ($i = 1; $i -le 60; $i++) {
            try {
              $r = Invoke-WebRequest -Uri http://localhost:8080/health -UseBasicParsing -ErrorAction Stop
              if ($r.StatusCode -eq 200) { Write-Host "Gateway healthy after ${i}s"; exit 0 }
            } catch {}
            Start-Sleep -Seconds 1
          }
          Write-Host "Gateway health check failed after 60s"
          docker logs plit 2>&1 | Select-Object -Last 50
          exit 1

      - name: Verify Pipelit API (unix)
        if: runner.os != 'Windows'
        run: |
          for i in $(seq 1 60); do
            if curl -sf http://localhost:8000/api/v1/auth/token/ -X POST -H "Content-Type: application/json" -d '{"username":"admin","password":"testpass123"}' > /dev/null 2>&1; then
              echo "Pipelit API responding after ${i}s"
              exit 0
            fi
            sleep 1
          done
          echo "Pipelit API check failed after 60s"
          docker logs plit 2>&1 | tail -50
          exit 1

      - name: Verify Pipelit API (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $body = '{"username":"admin","password":"testpass123"}'
          for ($i = 1; $i -le 60; $i++) {
            try {
              $r = Invoke-WebRequest -Uri http://localhost:8000/api/v1/auth/token/ -Method POST -ContentType "application/json" -Body $body -UseBasicParsing -ErrorAction Stop
              if ($r.StatusCode -eq 200) { Write-Host "Pipelit API responding after ${i}s"; exit 0 }
            } catch {}
            Start-Sleep -Seconds 1
          }
          Write-Host "Pipelit API check failed after 60s"
          docker logs plit 2>&1 | Select-Object -Last 50
          exit 1

      - name: Stop container
        if: always()
        run: ${{ matrix.binary }} stop

      - name: Container logs on failure
        if: failure()
        run: docker logs plit 2>&1
